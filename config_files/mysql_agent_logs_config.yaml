processors:
  batch:
    metadata_keys:
      - X-SF-Token

  # Enabling the memory_limiter is strongly recommended for every pipeline.
  # Configuration is based on the amount of memory allocated to the collector.
  # For more information about memory limiter, see
  # https://github.com/open-telemetry/opentelemetry-collector/blob/main/processor/memorylimiter/README.md
  memory_limiter:
    check_interval: 2s
    limit_mib: ${SPLUNK_MEMORY_LIMIT_MIB}

  # Detect if the collector is running on a cloud system, which is important for creating unique cloud provider dimensions.
  # Detector order is important: the `system` detector goes last so it can't preclude cloud detectors from setting host/os info.
  # Resource detection processor is configured to override all host and cloud attributes because instrumentation
  # libraries can send wrong values from container environments.
  # https://docs.splunk.com/Observability/gdi/opentelemetry/components/resourcedetection-processor.html#ordering-considerations
  resourcedetection:
    detectors: [gcp, ecs, ec2, azure, system]
    override: true

  # Optional: The following processor can be used to add a default "deployment.environment" attribute to the logs and
  # traces when it's not populated by instrumentation libraries.
  # If enabled, make sure to enable this processor in a pipeline.
  # For more information, see https://docs.splunk.com/Observability/gdi/opentelemetry/components/resource-processor.html
  #resource/add_environment:
    #attributes:
      #- action: insert
        #value: staging/production/...
        #key: deployment.environment

  # The following processor is used to add "otelcol.service.mode" attribute to the internal metrics
  resource/add_mode:
    attributes:
      - action: insert
        value: "agent"
        key: otelcol.service.mode

  metricstransform:
    transforms:
      - include: ^mysql\.
        match_type: regexp
        action: update
        operations:
          - action: add_label
            new_label: agent_version
            new_value: version {{version}}
      - include: ^system\.
        match_type: regexp
        action: update
        operations:
          - action: add_label
            new_label: agent_version
            new_value: version {{version}}

  transform/splunk_metadata:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(log.attributes["com.splunk.sourcetype"], "mysql:plus:error") where log.attributes["log.file.path"] == "/var/log/mysql/error.log"
          - set(log.attributes["com.splunk.sourcetype"], "mysql:plus:query") where log.attributes["log.file.path"] == "/var/log/mysql/query.log"
          - set(log.attributes["com.splunk.sourcetype"], "mysql:plus:mysql-slow") where log.attributes["log.file.path"] == "/var/log/mysql/mysql-slow.log"
          - set(log.attributes["com.splunk.sourcetype"], "syslog") where log.attributes["log.file.path"] == "/var/log/syslog"

          - set(log.attributes["com.splunk.index"], "otel-logs") where log.attributes["log.file.path"] == "/var/log/syslog"
          - set(log.attributes["com.splunk.index"], "otel-logs") where log.attributes["log.file.path"] == "/var/log/mysql/error.log"
          - set(log.attributes["com.splunk.index"], "otel-logs") where log.attributes["log.file.path"] == "/var/log/mysql/query.log"
          - set(log.attributes["com.splunk.index"], "otel-logs") where log.attributes["log.file.path"] == "/var/log/mysql/mysql-slow.log"
          
          # Map the log.file.path to the Splunk 'source' field
          - set(log.attributes["com.splunk.source"], log.attributes["log.file.path"]) where log.attributes["log.file.path"] != nil

exporters:
  # Traces
  otlp_http:
    traces_endpoint: "${SPLUNK_INGEST_URL}/v2/trace/otlp"
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"
    auth:
      authenticator: headers_setter
  # Metrics + Events
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    # api_url: "${SPLUNK_API_URL}"
    # ingest_url: "${SPLUNK_INGEST_URL}"
    # Use instead when sending to gateway
    api_url: http://${SPLUNK_GATEWAY_URL}:6060
    ingest_url: http://${SPLUNK_GATEWAY_URL}:9943
    sync_host_metadata: true
    correlation:

  # Entities (applicable only if discovery mode is enabled)
  otlp_http/entities:
    logs_endpoint: "${SPLUNK_INGEST_URL}/v3/event"
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"
    auth:
      authenticator: headers_setter

  # Logs
  splunk_hec:
    token: "${SPLUNK_HEC_TOKEN}"
    endpoint: "${SPLUNK_HEC_URL}"
    # source: "otel" # Will only take effect if the incoming log doesn't have "com.splunk.source" attribute set by the transform processor
    # sourcetype: "otel" # Will only take effect if the incoming log doesn't have "com.splunk.sourcetype" attribute set by the transform processor
    # index: "main" # Optional: specify the index to send logs to. If not set, it will go to the default index configured in HEC.
    # host: "otel-collector" # Optional: specify the host field for incoming logs. If not set, it will use the host from which the log was sent or "unknown" if not available.
    # batch_max_size: 1024 # Optional: maximum number of logs to include in a batch before sending to HEC. Default is 1024.
    # batch_timeout: 5s # Optional: maximum amount of time to wait before sending a batch of logs to HEC. Default is 5s.
    # retry_on_failure: true # Optional: whether to retry sending logs to HEC if the initial attempt fails. Default is true.
    # max_retries: 3 # Optional: maximum number of retry attempts if sending logs to HEC fails. Default is 3.
    # retry_delay: 5s # Optional: amount of time to wait between retry attempts if sending logs to HEC fails. Default is 5s.
    # tls:
    #   insecure: true # Optional: whether to skip TLS certificate verification when sending logs to HEC. Default is false.  
    profiling_data_enabled: false

  otlp_http/logs:
    endpoint: "http://${SPLUNK_OTLP_URL}:4318"
    
  otlp_grpc/logs:
    endpoint: "${SPLUNK_OTLP_URL}:4317"
    tls:
      insecure: true

  # # HEC Metrics
  # splunk_hec/metrics:
  #   token: "${SPLUNK_HEC_METRICS_TOKEN}"
  #   endpoint: "${SPLUNK_HEC_URL}"
  #   #source: "otel"
  #   #sourcetype: "otel"
  #   profiling_data_enabled: false

  # Profiling
  splunk_hec/profiling:
    token: "${SPLUNK_ACCESS_TOKEN}"
    endpoint: "${SPLUNK_INGEST_URL}/v1/log"
    log_data_enabled: false

  # Send to gateway
  otlp_http/gateway:
    endpoint: http://${SPLUNK_GATEWAY_URL}:4318
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"
    auth:
      authenticator: headers_setter

  otlp_grpc/gateway:
    endpoint: "${SPLUNK_GATEWAY_URL}:4317"
    tls:
      insecure: true
    auth:
      authenticator: headers_setter

  # Debug
  debug:
    verbosity: detailed

service:
  extensions:
  - headers_setter
  - health_check
  - file_storage/filelogs
  - http_forwarder
  - zpages
  - smartagent

  pipelines:
    traces:
      receivers:
      - otlp
      processors:
      - memory_limiter
      - batch
      - resourcedetection
      #- resource/add_environment
      exporters:
      # - otlp_http
      # - signalfx
      # Use instead when sending to gateway
      - otlp_http/gateway
      - signalfx

    metrics:
      receivers:
      - hostmetrics
      - otlp
      # MySql Specific Receivers
      # - smartagent/mysql # removed as now using auto discovery
      # - mysql # removed as now using auto discovery
      processors:
      - memory_limiter
      - batch
      - resourcedetection
      - metricstransform
      exporters:
      # - signalfx
      # Use instead when sending to gateway
      - otlp_http/gateway
      # Also send metrics to Splunk if splunk_hec_metrics_enabled = true (gets enabled in terraform config and script)
      # - splunk_hec/metrics

    metrics/internal:
      receivers:
      - prometheus/internal
      processors:
      - memory_limiter
      - batch
      - resourcedetection
      - resource/add_mode
      # When sending to gateway, at least one metrics pipeline needs
      # to use signalfx exporter so host metadata gets emitted
      exporters:
      - signalfx

    logs/signalfx:
      receivers:
      - smartagent/processlist
      processors:
      - memory_limiter
      - batch
      - resourcedetection
      exporters:
      - signalfx

    logs/entities:
      # Receivers are dynamically added if discovery mode is enabled
      receivers:
      - nop
      processors:
      - memory_limiter
      - batch
      - resourcedetection
      exporters:
      # - otlp_http/entities
      # Use instead when sending to gateway
      - otlp_http/gateway

    logs:
      receivers:
      - otlp
      - filelog/mysql-error
      - filelog/mysql-query
      - filelog/mysql-slow_query
      - filelog/syslog
      processors:
      - memory_limiter
      - batch
      - resourcedetection
      - transform/splunk_metadata
      #- resource/add_environment
      exporters:
      # - splunk_hec
      - otlp_http/logs
      # - otlp_grpc/logs
      # - splunk_hec/profiling
      # Use instead when sending to gateway
      # - otlp_http/gateway
